<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Detail — BuildOn</title>
  <meta name="description" content="View project details, failures, insights, and lineage.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="app-sidebar" id="appSidebar"></aside>
    <main class="app-main">
      <div class="app-topbar">
        <button class="sidebar-toggle-btn" onclick="document.querySelector('.app-layout').classList.toggle('sidebar-collapsed')" aria-label="Toggle sidebar">☰</button>
        <div class="app-topbar-right"><div class="app-user-pill" id="userPill"></div></div>
      </div>
      <div class="app-content" id="detailContent">
        <div class="card-grid"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/seedData.js"></script>
  <script src="js/data.js"></script>
  <script src="js/session.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/comments.js"></script>
  <script src="js/components.js"></script>
  <script src="js/lineage.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await renderDashboardSidebar('explore');
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      if (!id) { location.href = 'explorer.html'; return; }

      const project = await getProjectById(id);
      if (!project) { document.getElementById('detailContent').innerHTML = renderEmptyState('📁','Project Not Found','This project doesn\'t exist.'); return; }

      const projects = await getAllProjects();
      const catClass = getCategoryClass(project.category);
      const outcomeClass = getOutcomeClass(project.outcome);
      const tierClass = getTierClass(project.quality_tier);
      const forkCount = project.forks ? project.forks.length : 0;

      // Related projects (same category, different id)
      const related = projects.filter(p => p.category === project.category && p.id !== project.id).slice(0, 3);

      // Build lineage chain
      const lineage = buildLineageChain(project, projects);

      document.getElementById('detailContent').innerHTML = `
        <div class="breadcrumb">
          <a href="explorer.html">Explore</a><span>›</span>
          <a href="explorer.html">${project.category}</a><span>›</span>
          ${project.title}
        </div>
        <div class="detail-layout">
          <div>
            <h1>${project.title}</h1>
            <div class="meta-row">
              <span>${project.team.join(', ')}</span>
              <span class="divider"></span>
              <span>${project.year}</span>
              <span class="divider"></span>
              <span class="outcome-badge ${outcomeClass}">${project.outcome}</span>
              <span class="tier-badge ${tierClass}">${project.quality_tier}</span>
              <span class="fork-count"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M6 3v6m0 0a3 3 0 1 0 3 3V9M18 3v6m0 0a3 3 0 0 1-3 3v0a3 3 0 0 1-3-3"/><circle cx="6" cy="18" r="3"/></svg> ${forkCount} fork${forkCount!==1?'s':''}</span>
            </div>

            <div class="tabs" id="detailTabs">
              <button class="tab-btn active" data-tab="overview">Overview</button>
              <button class="tab-btn" data-tab="failures">Failures</button>
              <button class="tab-btn" data-tab="insights">Insights</button>
              <button class="tab-btn" data-tab="questions">Questions</button>
              <button class="tab-btn" data-tab="lineage">Lineage</button>
              <button class="tab-btn" data-tab="discussion">Discussion</button>
            </div>

            <div class="tab-content active" id="tab-overview">
              <div class="detail-section">
                <div class="detail-section-label">THE PROBLEM</div>
                <div class="detail-section-body">${project.problem}</div>
              </div>
              <div class="detail-section">
                <div class="detail-section-label">THE APPROACH</div>
                <div class="detail-section-body">${project.approach}</div>
              </div>
              <div class="detail-section">
                <div class="detail-section-label">WHAT WORKED</div>
                <div class="detail-section-body">${project.what_worked}</div>
              </div>
            </div>

            <div class="tab-content" id="tab-failures">
              <div class="detail-section">
                <div class="detail-section-label">What Went Wrong</div>
                ${project.failures && project.failures.length ? project.failures.map(f => `
                  <div class="failure-card">
                    <h4>⚠️ ${f.title}</h4>
                    <p>${f.description}</p>
                  </div>
                `).join('') : `<p style="color:var(--text-muted);font-style:italic">This team did not document failures.</p>`}
              </div>
            </div>

            <div class="tab-content" id="tab-insights">
              ${project.insights && project.insights.length ? project.insights.map((ins, i) => `
                <div class="insight-row">
                  <div class="insight-number">${i+1}</div>
                  <div class="insight-text">${ins.text}</div>
                  <div class="confidence-dot confidence-${ins.confidence}"></div>
                </div>
              `).join('') : renderEmptyState('💡','No Insights','No insights were documented for this project.')}
            </div>

            <div class="tab-content" id="tab-questions">
              ${project.open_questions && project.open_questions.length ? project.open_questions.map(q => `
                <div class="question-card">
                  <div>
                    <div class="q-text">${q.text}</div>
                    <div class="q-source">From ${project.title} · ${project.year}</div>
                  </div>
                  ${q.status === 'open' ? '<button class="btn btn-teal btn-sm">Adopt</button>' : `<span class="status-badge status-${q.status}">${q.status}</span>`}
                </div>
              `).join('') : renderEmptyState('❓','No Questions','No open questions from this project.')}
            </div>

            <div class="tab-content" id="tab-lineage">
              <div class="detail-section-label">PROJECT LINEAGE</div>
              <div id="lineageTimeline"></div>
            </div>

            <div class="tab-content" id="tab-discussion">
              <div id="discussionContainer"></div>
            </div>
          </div>

          <div class="sidebar">
            <a href="submit.html?fork=${project.id}" class="btn btn-primary btn-full btn-lg" style="margin-bottom:20px">Fork This Project</a>
            <div class="quick-query-card">
              <h3>💬 Ask the Community</h3>
              <textarea class="form-textarea" id="quickQueryText" placeholder="Quick question about this project..." rows="3"></textarea>
              <button class="btn btn-primary btn-sm" id="quickQueryBtn">Post Query</button>
            </div>
            <div class="sidebar-card">
              <h3 style="font-size:14px;margin-bottom:16px">Project Stats</h3>
              <div class="sidebar-stat"><span class="sidebar-stat-label">Rank Score</span><span class="sidebar-stat-value">${project.rank_score}</span></div>
              <div class="sidebar-stat"><span class="sidebar-stat-label">Legacy Score</span><span class="sidebar-stat-value">${project.legacy_score}</span></div>
              <div class="sidebar-stat"><span class="sidebar-stat-label">Times Forked</span><span class="sidebar-stat-value">${forkCount}</span></div>
              <div class="sidebar-stat"><span class="sidebar-stat-label">Impact Score</span><span class="sidebar-stat-value">${project.impact_score}</span></div>
            </div>
            ${related.length ? `<div class="sidebar-card">
              <h3 style="font-size:14px;margin-bottom:16px">Related Projects</h3>
              ${related.map(r => `<div class="related-card" onclick="location.href='detail.html?id=${r.id}'">
                <div class="related-title">${r.title}</div>
                <div class="related-cat">${r.category} · ${r.year}</div>
              </div>`).join('')}
            </div>` : ''}
          </div>
        </div>
      `;

      // Tabs
      document.querySelectorAll('#detailTabs .tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#detailTabs .tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
      });

      // Lineage
      renderLineageTimeline(lineage, project.id, document.getElementById('lineageTimeline'));

      // Discussion
      renderDiscussionTab(project.id, document.getElementById('discussionContainer'));

      // Quick Query
      document.getElementById('quickQueryBtn').addEventListener('click', async () => {
        const text = document.getElementById('quickQueryText').value.trim();
        if (!text) return;
        if (!(await isLoggedIn())) { location.href = 'login.html'; return; }
        postQuickQuery(project.id, text);
        document.getElementById('quickQueryText').value = '';
        // Switch to discussion tab and refresh
        document.querySelectorAll('#detailTabs .tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelector('[data-tab="discussion"]').classList.add('active');
        document.getElementById('tab-discussion').classList.add('active');
        renderDiscussionTab(project.id, document.getElementById('discussionContainer'));
      });
    });
  </script>
</body>
</html>
