<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Innovation Gaps — BuildOn</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="app-sidebar" id="appSidebar"></aside>

    <!-- Main Content -->
    <main class="app-main">
      <div class="app-topbar">
        <button class="sidebar-toggle-btn" onclick="document.querySelector('.app-layout').classList.toggle('sidebar-open')" aria-label="Toggle Menu">☰</button>
        <div class="app-topbar-right">
          <div id="userPill" class="app-user-pill"></div>
        </div>
      </div>

      <div class="app-content">
        <div class="dash-welcome">
          <div>
            <h1>Innovation Gaps</h1>
            <p class="subtitle">Discover problems that have been attempted multiple times but remain unsolved.</p>
          </div>
        </div>

        <div class="dash-stats">
          <div class="dash-stat-card">
            <div class="dash-stat-icon">🎯</div>
            <div class="dash-stat-value" id="totalGaps">0</div>
            <div class="dash-stat-label">Identified Gaps</div>
          </div>
          <div class="dash-stat-card">
            <div class="dash-stat-icon">🔄</div>
            <div class="dash-stat-value" id="recurringFailures">0</div>
            <div class="dash-stat-label">Recurring Failures</div>
          </div>
          <div class="dash-stat-card">
            <div class="dash-stat-icon">❓</div>
            <div class="dash-stat-value" id="unansweredQuestions">0</div>
            <div class="dash-stat-label">Unanswered Questions</div>
          </div>
          <div class="dash-stat-card">
            <div class="dash-stat-icon">💡</div>
            <div class="dash-stat-value" id="opportunityScore">0</div>
            <div class="dash-stat-label">Opportunity Score</div>
          </div>
        </div>

        <div class="tabs" id="gapTabs">
          <button class="tab-btn active" data-target="gap-list">All Gaps</button>
          <button class="tab-btn" data-target="gap-insights">Gap Insights</button>
        </div>

        <div id="gap-list" class="tab-content active" style="display: block;">
          <div class="search-bar">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="Search gaps by problem, category...">
          </div>
          
          <div class="filter-row" id="filterCategory">
            <button class="filter-pill active" data-value="all">All Categories</button>
            <button class="filter-pill" data-value="Food & Delivery">Food</button>
            <button class="filter-pill" data-value="Mental Health">Mental Health</button>
            <button class="filter-pill" data-value="Education">Education</button>
            <button class="filter-pill" data-value="Sustainability">Sustainability</button>
            <button class="filter-pill" data-value="Campus Safety">Safety</button>
            <button class="filter-pill" data-value="Marketplace">Marketplace</button>
            <button class="filter-pill" data-value="Career">Career</button>
          </div>

          <div id="gapGrid" class="dash-grid" style="margin-top: 24px;">
            <!-- Gap cards injected via JS -->
          </div>
          <div id="emptyState" class="empty-state" style="display:none; text-align:center; padding: 48px 0;"></div>
        </div>
        
        <div id="gap-insights" class="tab-content" style="display: none;">
          <div class="dash-grid">
            <div class="dash-panel">
              <h3 class="dash-panel-title">Top Abandoned Categories</h3>
              <div id="abandonedCategoriesList" class="feed-list"></div>
            </div>
            <div class="dash-panel">
              <h3 class="dash-panel-title">Most Common Failures</h3>
              <div id="commonFailuresList" class="feed-list"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/seedData.js"></script>
  <script src="js/data.js"></script>
  <script src="js/session.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/similarity.js"></script>
  <script src="js/gaps.js"></script>
</body>
</html>
